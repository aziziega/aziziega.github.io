<!DOCTYPE html>
<html>
<head>
	<title>HTML Form</title>
</head>
<body>

<form>
<table border="0" cellspacing="0" cellpadding="0">
		<tr>
			<td><label for="username">username : </label></td>
			<td><input type="text" id="username"></td>
		</tr>
		<tr>
			<td><label for="password">Password : </label></td>
			<td><input type="password" id="password"></td>
		</tr>
		<tr>
			<td><label>Gender : </label></td>
			<td colspan="2"><input type="radio" id="pria" name="x"><label for="pria">Pria</label>
			<input type="radio" id="wanita" name="x"><label for="wanita">Wanita</label>
		</tr>
		<tr>
			<td><label>Hobi : </label></td>
			<td><input type="checkbox" id="menyanyi"><label for="menyanyi">Menyanyi</label>
			<input type="checkbox" id="Olahraga"><label for="Olahraga">Olahraga</label>
			<input type="checkbox" id="Ngoding"><label for="Ngoding">Ngoding</label></td>
		</tr>
		<tr>
			<td><label>Tanggapan : </label></td>
			<td><textarea></textarea></td>
		</tr>
		<tr>
			<td><label>Asal daerah :</label></td>
			<td>
			<select>
				<option>Jakarta</option>
				<option>Bandung</option>
				<option>Semarang</option>
				<option>Yogyakarta</option>
				<option>Balikpapan</option>
				<option>Samarinda</option>
				<option>Tenggarong</option>
			</select>
			</td>
		</tr>
		<tr>
			<td><button type="submit">Kirim!</button></td>
		</tr>
</table>
</form>
</body>
</html>
